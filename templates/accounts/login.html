{% extends "base.html" %}
{% block title %}Login - Cherry Hills Songs{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span class="field-error">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-full">Login</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="{% url 'accounts:register' %}">Register</a></p>
</div>
{% endblock %}
