{% extends "base.html" %}
{% block title %}Submit a Song - Cherry Hills Songs{% endblock %}
{% block content %}
<div class="form-card">
    <h2>Submit a Song</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span class="field-error">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-full">Submit Song</button>
    </form>
</div>
{% endblock %}
